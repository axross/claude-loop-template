name: Merge Checks

# INIT:OPTIONAL key=INDEPENDENT_REVIEW — EXAMPLE workflow, GitHub-Actions-
# specific. Part of the independent-review capability: delete this file (with
# claude-review.yaml, REVIEW.md, and the .claude/commands/ entry points) if the
# project does not adopt it; see the INIT.md Step-4 bullet.
#
# The project's own CI: lint and unit tests that gate merges to the default
# branch. This is the CI the /address command's tail polls after a push (see
# .claude/commands/address.md). Keep REVIEW.md's do-not-report list in sync
# with exactly what these jobs enforce.
#
# The tokenized run commands below are substituted by `./init.sh apply` along
# with the rest of the template (the tokens are quoted because a YAML plain
# scalar cannot start with `{`). The toolchain setup is NOT a token: during
# INIT, replace it with the project's own (setup-node, .nvmrc, and the npm
# cache are examples, not requirements). The template ships no .nvmrc — even a
# project keeping the npm-flavored setup must create one (or switch to
# `node-version:`), or Setup Node fails on every run. Drop the test job if
# the project has no unit-test suite.

on:
  pull_request:
  push:
    branches: [main] # ← the project's default branch

# Cancel superseded runs on PR refs only: on the default branch every push is a
# distinct merged commit whose checks must run to completion, or back-to-back
# merges leave earlier commits with cancelled (never-completed) verification.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node # ← replace with the project's toolchain setup
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Dependency Installation
        run: "{{INSTALL_CMD}}"
      - name: Lint
        run: "{{LINT_CMD}}"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node # ← replace with the project's toolchain setup
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Dependency Installation
        run: "{{INSTALL_CMD}}"
      - name: Unit Test Run
        run: "{{UNIT_TEST_CMD}}"
